name: GitOps CI - Build & Push to DockerHub

on:
  workflow_call:

permissions:
  contents: write

env:
  DOCKERHUB_REPO: praveen416/E-commerce-app

jobs:
  build-and-push:
    name: Build, Test & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test
        continue-on-error: true

      - name: Set Image Tag
        id: tag
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Update Kubernetes Deployment Manifest
        run: |
          sed -i "s|image: ${{ env.DOCKERHUB_REPO }}:.*|image: ${{ env.DOCKERHUB_REPO }}:${{ steps.tag.outputs.sha_short }}|" k8s/deployment.yml

      - name: Commit Updated Manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yml
          git diff --staged --quiet || git commit -m "ci: update image to ${{ steps.tag.outputs.sha_short }} [skip ci]"
          git push