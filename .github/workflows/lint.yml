name: Code Linting

on:
    workflow_call:
        
permissions:
  contents: read

jobs:
  biome:
    name: Biome Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Biome
        run: npx @biomejs/biome check .